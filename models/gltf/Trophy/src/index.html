<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>Babylon.js sample code</title>

        <!-- Babylon.js -->
        <script src="https://cdn.babylonjs.com/babylon.js"></script>
        <script src="https://cdn.babylonjs.com/earcut.min.js"></script>
        <!-- glTF export (GLB) serializer -->
        <script src="https://cdn.babylonjs.com/serializers/babylonjs.serializers.min.js"></script>

        <style>
            html, body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #renderCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
            
            #canvasZone {
                width: 100%;
                height: 100%;
                position: relative;
            }

            #exportGlb {
                position: absolute;
                top: 16px;
                right: 16px;
                padding: 10px 18px;
                border: 0;
                border-radius: 8px;
                background: #2b579a;
                color: #fff;
                font: 16px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
                cursor: pointer;
            }

            #exportGlb:hover { background: #3767b1; }
            #exportGlb:disabled { background: #6b7280; cursor: default; }
        </style>
    </head>
<body>
    <div id="canvasZone">
        <canvas id="renderCanvas"></canvas>
        <button id="exportGlb" type="button">Export GLB</button>
    </div>
    <script>
var canvas = document.getElementById("renderCanvas");

var startRenderLoop = function (engine, canvas) {
  engine.runRenderLoop(function () {
    if (sceneToRender && sceneToRender.activeCamera) {
      sceneToRender.render();
    }
  });
}

var engine = null;
var scene = null;
var sceneToRender = null;
var createDefaultEngine = function () { return new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true, disableWebGL2Support: false }); };
// ============================================================
// Microsoft MVP Trophy recreation for the Babylon.js Playground
// Paste into https://playground.babylonjs.com/ (JS mode) and run.
// Note: earcut (required by ExtrudePolygon) is preloaded in the Playground.
//
// Structure:
//  - Clear panel: a plain monolith-like rectangular slab
//  - Blue sail: a wedge from a deep base to a top edge of panel thickness
//  - MVP logo: placed on the back-tilted front face via computed normal
//  - Globe: spherical scoop cut into the panel's back face (CSG), with a
//    Winkel Tripel world map etched on the wall of the scoop
//  - Year rings: slotted discs that clip onto the panel's side edge
//    (no center rod - held by the clip and stacking alone);
//    milestone rings ("5/10 Years") are translucent blue glass, the white
//    rings are milky subsurface-scattering acrylic (exported as
//    KHR_materials_diffuse_transmission/volume/volume_scatter), and all
//    ring lettering is embossed (baked highlight/shadow passes)
// ============================================================

var createScene = async function () {
    var scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.92, 0.91, 0.89, 1.0);

    // CSG2 (used below to carve the sail out of the panel) is backed by the
    // Manifold WASM library, which Babylon fetches from a CDN on demand.
    // If that fetch fails the scene still builds - the panel just keeps its
    // full box shape and overlaps the sail as before.
    var csgReady = false;
    try {
        await BABYLON.InitializeCSG2Async();
        csgReady = true;
    } catch (e) {
        console.warn("CSG2 unavailable, skipping the panel/sail boolean:", e);
    }

    // ---------- Camera, lights, environment ----------
    var camera = new BABYLON.ArcRotateCamera("camera",
        -Math.PI / 2 + 0.3, Math.PI / 2.3, 12,
        new BABYLON.Vector3(-0.2, 2.6, 0), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 4;
    camera.upperRadiusLimit = 40;
    camera.wheelPrecision = 20;
    camera.useAutoRotationBehavior = true;
    camera.autoRotationBehavior.idleRotationSpeed = 0.12;

    // IBL + skybox: prefiltered papermill environment hosted in the
    // cx20/gltf-test repo. The same cubemap drives the PBR lighting and is
    // shown unblurred as the visible background.
    var envTex = BABYLON.CubeTexture.CreateFromPrefilteredData(
        "https://cx20.github.io/gltf-test/textures/env/papermillSpecularHDR.env",
        scene);
    scene.environmentTexture = envTex;
    scene.environmentIntensity = 1.0;
    // Creates the "hdrSkyBox" mesh (excluded from the GLB export below).
    scene.createDefaultSkybox(envTex, true, 1000);

    var dirLight = new BABYLON.DirectionalLight("dir",
        new BABYLON.Vector3(-0.4, -1, 0.6), scene);
    dirLight.position = new BABYLON.Vector3(5, 12, -9);
    dirLight.intensity = 1.3;

    var hemi = new BABYLON.HemisphericLight("hemi",
        new BABYLON.Vector3(0, 1, 0), scene);
    hemi.intensity = 0.35;

    // ---------- Materials ----------
    // Two rendering modes share these materials:
    //  - LIVE (this page): plain alpha blending. Babylon's realtime
    //    subSurface refraction can only sample the .env texture - not the
    //    scene behind the glass - so with refraction on, the monolith reads
    //    as a mirror slab and the rings/inscription behind it disappear.
    //    Alpha blending shows the actual scene through the glass.
    //  - EXPORT: the Export GLB handler (bottom of the file) temporarily
    //    flips these materials to physical crystal - albedo white, alpha 1,
    //    subSurface refraction ON - so Babylon's serializer emits
    //    KHR_materials_transmission / ior / volume (+attenuation) /
    //    dispersion, then restores the live settings. glTF viewers with
    //    transmission support then render true crystal, with the cobalt
    //    color coming from volume attenuation (thicker = deeper blue).
    // The subSurface parameters are pre-configured here (inert while
    // isRefractionEnabled is false).
    var clearGlass = new BABYLON.PBRMaterial("clearGlass", scene);
    clearGlass.albedoColor = new BABYLON.Color3(0.9, 0.93, 0.95);
    clearGlass.metallic = 0;
    clearGlass.roughness = 0.03;
    clearGlass.alpha = 0.08;   // very transparent crystal
    clearGlass.subSurface.refractionIntensity = 1.0;
    clearGlass.subSurface.indexOfRefraction = 1.52;   // crown glass
    clearGlass.subSurface.minimumThickness = 0;
    clearGlass.subSurface.maximumThickness = 0.28;    // = panel thickness TP
    // Barely-there cool tint so thick clear regions read as crystal, not air
    clearGlass.subSurface.tintColor = new BABYLON.Color3(0.93, 0.96, 1.0);
    clearGlass.subSurface.tintColorAtDistance = 2.0;
    clearGlass.backFaceCulling = false;
    clearGlass.twoSidedLighting = true;
    clearGlass.separateCullingPass = true;
    clearGlass.environmentIntensity = 1.2;

    var blueGlass = new BABYLON.PBRMaterial("blueGlass", scene);
    // Same cobalt blue as the milestone rings (mileMat below), so the sail
    // and the "5/10 Years" rings read as the same glass. The subSurface tint
    // mirrors this color for the exported volume attenuation.
    blueGlass.albedoColor = new BABYLON.Color3(0.02, 0.12, 0.55);
    blueGlass.metallic = 0;
    blueGlass.roughness = 0.06;
    blueGlass.alpha = 0.8;
    blueGlass.subSurface.refractionIntensity = 1.0;
    blueGlass.subSurface.indexOfRefraction = 1.52;
    blueGlass.subSurface.minimumThickness = 0;
    blueGlass.subSurface.maximumThickness = 1.2;      // wedge depth scale
    blueGlass.subSurface.tintColor = new BABYLON.Color3(0.04, 0.22, 0.8);
    blueGlass.subSurface.tintColorAtDistance = 0.6;
    // Subtle rainbow fringing on the crystal edges (KHR_materials_dispersion)
    blueGlass.subSurface.isDispersionEnabled = true;
    blueGlass.subSurface.dispersion = 0.15;
    blueGlass.backFaceCulling = false;
    blueGlass.twoSidedLighting = true;
    blueGlass.separateCullingPass = true;

    // ---------- Trophy body ----------
    // Lift the whole trophy a hair off the ground. The sail bottom (BASE_Y=0)
    // and the base puck bottom (y=0) would otherwise be coplanar with the
    // ground plane (y=0) and Z-fight. Ground/mirror stay at y=0.
    var GROUND_LIFT = 0.01;
    var trophy = new BABYLON.TransformNode("trophy", scene);
    trophy.position.x = 0.8;
    trophy.position.y = GROUND_LIFT;

    // Dimension parameters
    var W = 1.32;           // half width (widened by 1.2x)
    var TP = 0.28;          // clear panel thickness
    var PANEL_H = 5.6;      // panel height
    var SAIL_L = -1.05;     // left end of the sail base: lands UNDER the
                            // lowest ring (world x -0.25, inside the ring's
                            // footprint). The hypotenuse only rises above the
                            // lowest ring's bottom plane where the ring's rim
                            // is cut away by its notch, so the overlap with
                            // actual ring material is a sub-visible sliver.
    var PUCK_H = 0.28;      // base slab height; the panel stands on its top

    // Globe dimple: the globe is not a convex lens stuck on the panel - it is
    // a shallow spherical scoop ground into the BACK face of the clear panel.
    // Its side profile is therefore a "D": the flat back plane closed off by a
    // circular arc biting into the glass. A cap of radius GLOBE_R and depth
    // GLOBE_DEPTH is the intersection of the panel with a sphere of radius
    // GLOBE_SR = (r^2 + d^2) / 2d, centered GLOBE_SR - GLOBE_DEPTH behind the
    // back face.
    var GLOBE_R = 0.58;        // radius of the circle seen on the back face
    var GLOBE_DEPTH = 0.16;    // depth of the scoop (panel is TP = 0.28 thick)
    var GLOBE_Y = 4.905;       // height of the dimple center (raised by one
                               // ring: ringH 0.34 + stacking gap 0.015)
    var GLOBE_SR = (GLOBE_R * GLOBE_R + GLOBE_DEPTH * GLOBE_DEPTH)
                 / (2 * GLOBE_DEPTH);
    var GLOBE_CZ = TP / 2 + (GLOBE_SR - GLOBE_DEPTH);   // cutter sphere center

    // --- Clear panel (a plain, monolith-like rectangular slab) ---
    // Its bottom face sits on the base slab's top (PUCK_H), not on the
    // ground; the 0.004 gap keeps the two clear-glass faces from Z-fighting.
    var panel = BABYLON.MeshBuilder.CreateBox("panel",
        { width: 2 * W, height: PANEL_H, depth: TP }, scene);
    panel.position.y = PANEL_H / 2 + PUCK_H + 0.004;
    // Bake the height offset into the vertices so the panel's local transform
    // is identity, matching blueSail (whose vertices are already in trophy
    // space). The CSG2 boolean below can then run in trophy-local space and
    // its result can stay parented to the trophy node.
    panel.bakeCurrentTransformIntoVertices();
    panel.material = clearGlass;
    panel.parent = trophy;
    panel.alphaIndex = 1;

    // --- Blue sail (wedge: deep base -> top edge of thickness TP) ---
    // On the real trophy the top is not a sharp point but an edge with
    // the same thickness as the panel. The base starts right of the panel's
    // left edge (SAIL_L) so the ring stack, pushed fully onto the panel,
    // does not collide with the sail.
    var ZF = -0.84;     // front edge of the base (depth reduced to 0.8x)
    var ZB = TP / 2;    // back edge of the base, flush with the panel's back
                        // face: the sail's back face is vertical (same plane
                        // as the monolith), no bulge behind the panel
    var BASE_Y = 0;     // the sail sits directly on the ground
    // Top edge sits at x = W so the sail's right side is vertical and flush
    // with the panel's right face (base-right is already at x = W).
    var TOP = new BABYLON.Vector3(W, 4.35, 0);
    var topFront = new BABYLON.Vector3(TOP.x, TOP.y, -TP / 2);

    var positions = [
        SAIL_L, BASE_Y, ZF,        // 0: base front-left
         W,     BASE_Y, ZF,        // 1: base front-right
         W,     BASE_Y, ZB,        // 2: base back-right
        SAIL_L, BASE_Y, ZB,        // 3: base back-left
        TOP.x,  TOP.y, -TP / 2,    // 4: top edge, front
        TOP.x,  TOP.y,  TP / 2     // 5: top edge, back
    ];
    var indices = [
        0, 1, 4,            // front face (back-tilted triangle, carries the logo)
        1, 2, 5,  1, 5, 4,  // right face
        2, 3, 5,            // back face
        3, 0, 4,  3, 4, 5,  // left face (the hypotenuse face seen from the front)
        0, 2, 1,  0, 3, 2   // bottom face
    ];
    var normals = [];
    BABYLON.VertexData.ComputeNormals(positions, indices, normals);
    var vd = new BABYLON.VertexData();
    vd.positions = positions;
    vd.indices = indices;
    vd.normals = normals;
    // CSG2.subtract requires both operands to carry the same vertex
    // properties, and the panel box comes with UVs. The sail is untextured,
    // so a zero-filled UV set is enough to match (2 floats x 6 vertices).
    vd.uvs = new Array(12).fill(0);

    var blueSail = new BABYLON.Mesh("blueSail", scene);
    vd.applyToMesh(blueSail);
    blueSail.material = blueGlass;
    blueSail.parent = trophy;
    blueSail.alphaIndex = 1;

    // --- Carve the sail volume out of the clear panel (CSG2) ---
    // The panel and the sail interpenetrate: two transparent glass surfaces
    // crossing inside each other read as a muddy double-shaded overlap.
    // Subtracting the sail leaves a clean seam where they meet, so each
    // volume is drawn exactly once.
    // Both operands are in trophy-local space (see bakeCurrentTransformIntoVertices
    // above), hence ignoreWorldMatrix = true; the result is parented to trophy.
    // This runs while blueSail is still a shared-vertex indexed mesh - the
    // flat-shading conversion splits vertices, which would break manifoldness.
    // The same pass also scoops the globe dimple out of the back face with a
    // second subtraction (see the GLOBE_* constants above).
    if (csgReady) {
        // Cutter sphere for the dimple. Its transform is baked in so it lives
        // in trophy-local space like the other two operands.
        var dimple = BABYLON.MeshBuilder.CreateSphere("dimple",
            { diameter: 2 * GLOBE_SR, segments: 96 }, scene);
        dimple.position.set(0, GLOBE_Y, GLOBE_CZ);
        dimple.bakeCurrentTransformIntoVertices();

        var panelCSG = BABYLON.CSG2.FromMesh(panel, true);
        var sailCSG = BABYLON.CSG2.FromMesh(blueSail, true);
        var dimpleCSG = BABYLON.CSG2.FromMesh(dimple, true);
        var diff = panelCSG.subtract(sailCSG);
        var diff2 = diff.subtract(dimpleCSG);
        // centerMesh defaults to true, which re-centers the result's vertices
        // on the origin without compensating mesh.position - that would drop
        // the panel by half its height. Keep the original coordinates.
        var carved = diff2.toMesh("panel", scene, { centerMesh: false });
        diff2.dispose();
        diff.dispose();
        panelCSG.dispose();
        sailCSG.dispose();
        dimpleCSG.dispose();
        dimple.dispose();
        panel.dispose();

        panel = carved;
        panel.material = clearGlass;
        panel.parent = trophy;
        panel.alphaIndex = 1;
    }

    blueSail.convertToFlatShadedMesh();   // crisp facet edges

    // --- MVP logo (aligned to the back-tilted front face) ---
    var logoDT = new BABYLON.DynamicTexture("logoDT",
        { width: 512, height: 512 }, scene, true);
    logoDT.hasAlpha = true;
    var lc = logoDT.getContext();
    lc.clearRect(0, 0, 512, 512);

    lc.save();
    lc.translate(256, 160);
    lc.rotate(Math.PI / 4);
    var grad = lc.createLinearGradient(-110, -110, 110, 110);
    grad.addColorStop(0.0, "#f8f8f8");
    grad.addColorStop(0.5, "#c8ccd4");
    grad.addColorStop(1.0, "#989ea8");
    lc.fillStyle = grad;
    lc.fillRect(-100, -100, 200, 200);
    lc.restore();

    lc.textAlign = "center";
    lc.textBaseline = "middle";
    lc.fillStyle = "#12388f";
    lc.font = "bold 100px Arial";
    lc.fillText("MVP", 256, 160);
    lc.fillStyle = "#ffffff";
    lc.font = "bold 46px Arial";
    lc.fillText("Microsoft\u00AE", 256, 350);
    lc.font = "38px Arial";
    lc.fillText("Most Valuable", 256, 405);
    lc.fillText("Professional", 256, 450);
    logoDT.update();

    var logoMat = new BABYLON.StandardMaterial("logoMat", scene);
    // Put the text/alpha on the diffuse (base color) channel so it survives
    // a glTF export: glTF has no separate opacity texture, and its emissive
    // texture carries no alpha. diffuse + useAlphaFromDiffuseTexture maps to
    // baseColorTexture (RGBA), and disableLighting -> KHR_materials_unlit.
    logoMat.diffuseTexture = logoDT;
    logoMat.useAlphaFromDiffuseTexture = true;
    logoMat.emissiveTexture = logoDT;
    logoMat.disableLighting = true;
    logoMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
    logoMat.backFaceCulling = false;

    // Compute the front face normal and align the plane to that face.
    // (The front face is the triangle spanned by the base edge p0-p1
    // and the front vertex of the top edge, topFront.)
    var p0 = new BABYLON.Vector3(SAIL_L, BASE_Y, ZF);
    var p1 = new BABYLON.Vector3( W,     BASE_Y, ZF);
    var frontN = BABYLON.Vector3.Cross(
        p1.subtract(p0), topFront.subtract(p0)).normalize();
    if (frontN.z > 0) {
        frontN = frontN.negate();   // make it face front (-Z)
    }

    // Anchor on the line from the base midpoint to topFront at height logoY,
    // then shift right by logoXOffset to match the real trophy photos.
    // (The face's horizontal direction is the X axis itself, so an X offset
    // keeps the plane on the face.)
    var logoY = 1.0;
    var logoXOffset = 0.2;    // keeps the logo at the same spot on the face
                              // after widening the sail base to SAIL_L -1.05
                              // (baseMid moved left; offset compensates)
    var baseMid = new BABYLON.Vector3((SAIL_L + W) / 2, BASE_Y, ZF);
    var tLogo = (logoY - BASE_Y) / (topFront.y - BASE_Y);
    var logoCenter = baseMid.add(topFront.subtract(baseMid).scale(tLogo))
                            .add(frontN.scale(0.02));
    logoCenter.x += logoXOffset;

    var logoPlane = BABYLON.MeshBuilder.CreatePlane("logoPlane",
        { size: 1.55 }, scene);
    logoPlane.position.copyFrom(logoCenter);
    var q = new BABYLON.Quaternion();
    BABYLON.Quaternion.FromUnitVectorsToRef(
        new BABYLON.Vector3(0, 0, -1), frontN, q);
    logoPlane.rotationQuaternion = q;
    logoPlane.material = logoMat;
    logoPlane.parent = trophy;
    logoPlane.alphaIndex = 2;

    // --- Etched inscription on the clear panel ---
    var insDT = new BABYLON.DynamicTexture("insDT",
        { width: 512, height: 256 }, scene, true);
    insDT.hasAlpha = true;
    var ic = insDT.getContext();
    ic.clearRect(0, 0, 512, 256);
    ic.fillStyle = "rgba(255,255,255,0.85)";
    // 36px: the longest line measures 469px, which still fits the 512px
    // texture with the 30px left margin.
    ic.font = "italic 36px Georgia";
    ic.textAlign = "left";
    var lines = [
        "We recognize and value your",
        "exceptional contributions",
        "to technical communities",
        "worldwide."
    ];
    for (var i = 0; i < lines.length; i++) {
        ic.fillText(lines[i], 30, 67 + i * 55);
    }
    insDT.update();

    var insMat = new BABYLON.StandardMaterial("insMat", scene);
    // See logoMat: diffuse+alpha channel so the text exports to glTF.
    insMat.diffuseTexture = insDT;
    insMat.useAlphaFromDiffuseTexture = true;
    insMat.emissiveTexture = insDT;
    insMat.disableLighting = true;
    insMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
    insMat.alpha = 0.5;   // faint, engraving-like
    insMat.backFaceCulling = false;

    var insPlane = BABYLON.MeshBuilder.CreatePlane("insPlane",
        { width: 1.9, height: 0.95 }, scene);
    // x = 0: the text's left edge (30px margin in the 512px texture =
    // 0.11 world on the 1.9-wide plane, i.e. -0.84 trophy-local) lines up
    // with the ring stack's right edge (world -0.035 = trophy-local -0.835).
    // z = 0: like the real trophy, the inscription is engraved INSIDE the
    // glass, so the plane sits at the panel's mid-thickness, not on its
    // front face. It draws after the panel (alphaIndex 2) so it stays
    // visible through the glass.
    insPlane.position.set(0, 3.45, 0);
    insPlane.material = insMat;
    insPlane.parent = trophy;
    insPlane.alphaIndex = 2;

    // --- Globe map (Winkel Tripel projection, etched on the dimple wall) ---
    // Read the pixels of worldHeightMap.jpg (equirectangular) and splat
    // them through the forward Winkel Tripel projection
    // (standard parallel arccos(2/pi) ~= 50.5 deg,
    //  central meridian 10 deg East = Europe-centered).
    var GD = 1024;   // side length of the map texture
    var globeDT = new BABYLON.DynamicTexture("globeDT",
        { width: GD, height: GD }, scene, true);
    globeDT.hasAlpha = true;
    var gctx = globeDT.getContext();
    gctx.clearRect(0, 0, GD, GD);          // transparent background
    // Nudge the RGB of transparent pixels toward the continent color
    // (prevents dark edge fringing; 1% alpha is invisible).
    gctx.fillStyle = "rgba(143,149,156,0.01)";
    gctx.fillRect(0, 0, GD, GD);
    globeDT.update();

    var mapImg = new Image();
    mapImg.crossOrigin = "anonymous";
    mapImg.onload = function () {
        try {
            var SW = 1024, SH = 512;
            var off = document.createElement("canvas");
            off.width = SW;
            off.height = SH;
            var octx = off.getContext("2d");
            octx.drawImage(mapImg, 0, 0, SW, SH);
            var src = octx.getImageData(0, 0, SW, SH).data;

            var phi1 = Math.acos(2 / Math.PI);   // standard parallel
            var lon0 = 10 * Math.PI / 180;       // central meridian (10 deg E)
            var XMAX = 2.5754;                   // max projected x coordinate
            var mapScale = (GD * 0.49) / XMAX;

            // Sea-level pixels are not necessarily 0 (JPEG adds a floor).
            // The sea dominates the image as a uniform region, so treat the
            // histogram mode as the sea level and threshold slightly above it.
            var hist = new Array(256).fill(0);
            for (var hi = 0; hi < SW * SH; hi++) {
                hist[src[hi * 4]]++;
            }
            var mode = 0;
            for (var hv = 1; hv < 256; hv++) {
                if (hist[hv] > hist[mode]) mode = hv;
            }
            var TH = mode + 2;   // sea level + minimal margin (keep lowlands)

            // The tight margin lets noise through; clean it up on the mask:
            //   1) build a land mask from the threshold
            //   2) land with < 3 of 8 neighbors -> sea (remove speckle noise)
            //      sea with >= 6 of 8 neighbors -> land (fill pinholes)
            var mask = new Uint8Array(SW * SH);
            for (var mi = 0; mi < SW * SH; mi++) {
                mask[mi] = src[mi * 4] >= TH ? 1 : 0;
            }
            function neighbors8(m, x, y) {
                var n = 0;
                for (var dy = -1; dy <= 1; dy++) {
                    for (var dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        var xx = x + dx, yy = y + dy;
                        if (xx < 0 || xx >= SW || yy < 0 || yy >= SH) continue;
                        n += m[yy * SW + xx];
                    }
                }
                return n;
            }
            var mask2 = new Uint8Array(SW * SH);
            for (var my = 0; my < SH; my++) {
                for (var mx = 0; mx < SW; mx++) {
                    var n8 = neighbors8(mask, mx, my);
                    var mIdx = my * SW + mx;
                    mask2[mIdx] = mask[mIdx] ? (n8 >= 3 ? 1 : 0)
                                             : (n8 >= 6 ? 1 : 0);
                }
            }

            gctx.fillStyle = "#8f959c";          // continents (gray)
            for (var sy = 0; sy < SH; sy++) {
                var lat = Math.PI / 2 - ((sy + 0.5) / SH) * Math.PI;
                if (lat < -60 * Math.PI / 180) continue;   // skip Antarctica
                for (var sx = 0; sx < SW; sx++) {
                    if (!mask2[sy * SW + sx]) continue;
                    var lon = ((sx + 0.5) / SW) * 2 * Math.PI - Math.PI - lon0;
                    if (lon < -Math.PI) lon += 2 * Math.PI;
                    if (lon >  Math.PI) lon -= 2 * Math.PI;
                    // Forward Winkel Tripel projection
                    var a = Math.acos(Math.cos(lat) * Math.cos(lon / 2));
                    var sinca = (a < 1e-9) ? 1 : Math.sin(a) / a;
                    var X = 0.5 * (lon * Math.cos(phi1) +
                        2 * Math.cos(lat) * Math.sin(lon / 2) / sinca);
                    var Y = 0.5 * (lat + Math.sin(lat) / sinca);
                    gctx.fillRect(GD / 2 + X * mapScale - 1,
                                  GD / 2 - Y * mapScale - 1, 2, 2);
                }
            }
        } catch (e) {
            // Fallback: draw the raw image if pixels cannot be read
            gctx.drawImage(mapImg, 0, GD / 4, GD, GD / 2);
        }
        globeDT.update();
    };
    mapImg.src = "textures/worldHeightMap.jpg";

    // Show only the continents; everything else stays transparent
    // (only the etched lines appear to float, like the real trophy).
    var globeMat = new BABYLON.StandardMaterial("globeMat", scene);
    // See logoMat: diffuse+alpha channel so the map exports to glTF.
    globeMat.diffuseTexture = globeDT;
    globeMat.useAlphaFromDiffuseTexture = true;
    globeMat.emissiveTexture = globeDT;
    globeMat.disableLighting = true;
    globeMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;

    // The map is visible from both sides of the glass, and its lighting is
    // baked (disableLighting), so culling would only hide it from the front.
    globeMat.backFaceCulling = false;

    // The map is etched on the WALL of the dimple, so its carrier is a
    // spherical cap matching that wall: same center as the cutter sphere, a
    // hair smaller in radius so it floats inside the scoop instead of
    // z-fighting the carved glass.
    // Spherical wrapping would distort a flat map, so the UVs are a planar
    // projection along Z (the real trophy has a flat map etched on the scoop).
    var CAP_SR = GLOBE_SR - 0.004;
    var CAP_RINGS = 24;    // subdivisions from the center out to the rim
    var CAP_SEG = 96;      // subdivisions around
    var capPos = [], capNrm = [], capUV = [], capIdx = [];
    for (var ri = 0; ri <= CAP_RINGS; ri++) {
        var rho = GLOBE_R * ri / CAP_RINGS;
        var dz = Math.sqrt(Math.max(CAP_SR * CAP_SR - rho * rho, 0));
        for (var si = 0; si <= CAP_SEG; si++) {
            var th = si / CAP_SEG * 2 * Math.PI;
            var cx = rho * Math.cos(th), cy = rho * Math.sin(th);
            capPos.push(cx, GLOBE_Y + cy, GLOBE_CZ - dz);
            // Outward = away from the glass, i.e. toward the sphere center.
            capNrm.push(-cx / CAP_SR, -cy / CAP_SR, dz / CAP_SR);
            capUV.push(cx / (2 * GLOBE_R) + 0.5, cy / (2 * GLOBE_R) + 0.5);
        }
    }
    for (var ri2 = 0; ri2 < CAP_RINGS; ri2++) {
        for (var si2 = 0; si2 < CAP_SEG; si2++) {
            var ia = ri2 * (CAP_SEG + 1) + si2;
            var ib = ia + 1;
            var ic = ia + CAP_SEG + 1;
            var id = ic + 1;
            capIdx.push(ia, ic, ib, ib, ic, id);
        }
    }
    var capVD = new BABYLON.VertexData();
    capVD.positions = capPos;
    capVD.normals = capNrm;
    capVD.uvs = capUV;
    capVD.indices = capIdx;

    var globe = new BABYLON.Mesh("globe", scene);
    capVD.applyToMesh(globe);
    globe.material = globeMat;
    globe.parent = trophy;
    globe.alphaIndex = 2;   // draw after the glass panel

    // --- Front lens face for the globe (export/viewer trick) ---
    // glTF viewers compute transmission refraction from the normals of the
    // FRONTMOST transmissive surface only. Seen from the back, that surface
    // is the carved dimple wall, so the concave-lens look works; seen from
    // the front it is the panel's flat face, so the globe shows no lens
    // distortion at all. This disc floats a hair in front of the panel over
    // the globe area: its geometry is flat (the real trophy's front face is
    // flat), but its NORMALS are those of the dimple's sphere mirrored to
    // face the viewer - viewers refract along the normals, so the globe
    // region gets the same lens distortion from the front. It shares
    // clearGlass, so in the live scene (alpha 0.08) it is invisible and it
    // flips to crystal mode on export automatically.
    var lensPos = [], lensNrm = [], lensIdx = [];
    var LENS_Z = -TP / 2 - 0.004;   // just proud of the panel's front face
    for (var li = 0; li <= CAP_RINGS; li++) {
        var lrho = GLOBE_R * li / CAP_RINGS;
        var ldz = Math.sqrt(Math.max(GLOBE_SR * GLOBE_SR - lrho * lrho, 0));
        for (var lsi = 0; lsi <= CAP_SEG; lsi++) {
            var lth = lsi / CAP_SEG * 2 * Math.PI;
            var lx = lrho * Math.cos(lth), ly = lrho * Math.sin(lth);
            lensPos.push(lx, GLOBE_Y + ly, LENS_Z);
            // Dimple-wall normals mirrored in z: a concave surface as seen
            // from the front (-z), matching the back-side lens character.
            lensNrm.push(lx / GLOBE_SR, ly / GLOBE_SR, -ldz / GLOBE_SR);
        }
    }
    for (var lr = 0; lr < CAP_RINGS; lr++) {
        for (var ls = 0; ls < CAP_SEG; ls++) {
            var la = lr * (CAP_SEG + 1) + ls;
            var lb = la + 1;
            var lc = la + CAP_SEG + 1;
            var ld = lc + 1;
            lensIdx.push(la, lb, lc, lb, ld, lc);
        }
    }
    var lensVD = new BABYLON.VertexData();
    lensVD.positions = lensPos;
    lensVD.normals = lensNrm;
    lensVD.indices = lensIdx;
    var lensFront = new BABYLON.Mesh("globeLensFront", scene);
    lensVD.applyToMesh(lensFront);
    lensFront.material = clearGlass;
    lensFront.parent = trophy;
    lensFront.alphaIndex = 1;

    // --- Front map layer (export/viewer companion of globeLensFront) ---
    // Through-glass detail dies in glTF viewers: transmission surfaces
    // sample a DOWNSCALED, mip-blurred copy of the opaque pass, so the 2px
    // continent dots of the in-dimple map dissolve to nothing when seen
    // through the panel + lens from the front (from the back the map is
    // viewed directly, hence visible). Like the real trophy - where the
    // etched map itself reads clearly from the front while the BACKGROUND
    // distorts through the cavity - this disc repeats the map texture just
    // in front of the lens, so viewers draw it crisply on top of the
    // refracted background. It is enabled only for export (see
    // setCrystalExportMode): in the live alpha-blend scene the in-dimple
    // cap is already visible from the front, and a second layer would show
    // as a parallax double image.
    var mapFrontPos = [], mapFrontNrm = [], mapFrontUV = [];
    var MAPF_Z = LENS_Z - 0.003;
    for (var mi2 = 0; mi2 <= CAP_RINGS; mi2++) {
        var mrho = GLOBE_R * mi2 / CAP_RINGS;
        for (var msi = 0; msi <= CAP_SEG; msi++) {
            var mth = msi / CAP_SEG * 2 * Math.PI;
            var mx2 = mrho * Math.cos(mth), my2 = mrho * Math.sin(mth);
            mapFrontPos.push(mx2, GLOBE_Y + my2, MAPF_Z);
            mapFrontNrm.push(0, 0, -1);
            mapFrontUV.push(mx2 / (2 * GLOBE_R) + 0.5,
                            my2 / (2 * GLOBE_R) + 0.5);
        }
    }
    var mapFrontVD = new BABYLON.VertexData();
    mapFrontVD.positions = mapFrontPos;
    mapFrontVD.normals = mapFrontNrm;
    mapFrontVD.uvs = mapFrontUV;
    mapFrontVD.indices = lensIdx;   // same grid topology as the lens disc
    var globeMapFront = new BABYLON.Mesh("globeMapFront", scene);
    mapFrontVD.applyToMesh(globeMapFront);
    globeMapFront.material = globeMat;
    globeMapFront.parent = trophy;
    globeMapFront.alphaIndex = 3;   // draws above the lens disc
    globeMapFront.setEnabled(false);   // export-only, see comment above

    // ---------- Year ring stack ----------
    // Each ring is "a solid disc with one rectangular notch cut from the
    // rim almost to the center":
    //   - the body is an ExtrudePolygon of the slotted-disc profile
    //   - the label is a separate ribbon (band) hugging the outer rim,
    //     skipping the notch
    var stack = new BABYLON.TransformNode("stack", scene);
    // Fully inserted: the panel's left edge (world x = trophy.x - W = -0.52)
    // reaches ring-local x = +0.04, just touching the felt end pad at the
    // notch's inner end (SLOT_END..0.02), like the real trophy.
    stack.position.set(-0.56, GROUND_LIFT, 0);   // same lift as trophy (avoid ground Z-fight)

    var RING_R = 0.525;    // radius (reduced to 0.7x)
    var SLIT_W = 0.34;     // notch width (slightly wider than the 0.28 panel)
    var SLOT_END = 0.0;    // x coordinate of the notch's inner end (near center)
    var ringH  = 0.374;    // ring thickness (height; 0.34 x 1.1)

    // Frosted-glass ring body material.
    // Alpha stays 1 (opaque): if alpha-translucent, the far-side label band
    // would show through and the text overlaps illegibly. The milky
    // translucency of the real ring comes from subsurface scattering
    // instead - light entering the ring diffuses inside and glows out -
    // which transmits LIGHT but not the image of the far-side band:
    //  - LIVE (this page): Babylon's realtime translucency approximates it
    //  - EXPORT: the Export GLB handler patches the ScatteringSkull-style
    //    extension set (KHR_materials_diffuse_transmission / volume /
    //    volume_scatter / ior) onto this material, see RING_SSS_EXTENSIONS
    var frostMat = new BABYLON.PBRMaterial("frostMat", scene);
    frostMat.albedoColor = new BABYLON.Color3(0.93, 0.93, 0.91);
    frostMat.metallic = 0;
    frostMat.roughness = 0.55;
    frostMat.subSurface.isTranslucencyEnabled = true;
    frostMat.subSurface.translucencyIntensity = 0.8;
    // Warm paper-white transmission tint (older Babylon builds without the
    // property simply ignore the assignment guard).
    if ("translucencyColor" in frostMat.subSurface) {
        frostMat.subSurface.translucencyColor =
            new BABYLON.Color3(0.98, 0.97, 0.94);
    }
    frostMat.backFaceCulling = false;
    frostMat.twoSidedLighting = true;

    // Milestone rings ("5 Years" / "10 Years"): translucent cobalt-blue
    // glass, like the real ring; alpha 0.8 keeps the front label legible.
    // The subSurface parameters are for the export-time crystal flip (see
    // the Materials comment above), with a smaller thickness scale to match
    // the ring's size.
    var mileMat = new BABYLON.PBRMaterial("mileMat", scene);
    mileMat.albedoColor = new BABYLON.Color3(0.02, 0.12, 0.55);
    mileMat.metallic = 0;
    mileMat.roughness = 0.05;
    mileMat.alpha = 0.8;
    mileMat.subSurface.refractionIntensity = 1.0;
    mileMat.subSurface.indexOfRefraction = 1.52;
    mileMat.subSurface.minimumThickness = 0;
    mileMat.subSurface.maximumThickness = 0.6;
    mileMat.subSurface.tintColor = new BABYLON.Color3(0.04, 0.22, 0.8);
    mileMat.subSurface.tintColorAtDistance = 0.35;
    mileMat.backFaceCulling = false;
    mileMat.twoSidedLighting = true;
    mileMat.separateCullingPass = true;
    mileMat.environmentIntensity = 1.1;

    // Felt lining inside the notch
    var feltMat = new BABYLON.StandardMaterial("feltMat", scene);
    feltMat.diffuseColor = new BABYLON.Color3(0.55, 0.52, 0.47);
    feltMat.specularColor = new BABYLON.Color3(0, 0, 0);

    // Profile of a solid disc with one rectangular notch cut from the rim
    // almost to the center (notch along +X, with parallel straight walls).
    function buildSlotDiscProfile(R, w, xEnd) {
        var a1 = Math.asin((w / 2) / R);   // half angle of the notch at the rim
        var pts = [];
        var N = 96;
        for (var i = 0; i <= N; i++) {
            var t = a1 + (2 * Math.PI - 2 * a1) * (i / N);
            pts.push(new BABYLON.Vector3(R * Math.cos(t), 0, R * Math.sin(t)));
        }
        // Into the notch: lower wall -> inner end -> upper wall
        // (the polygon closes back to the first point)
        pts.push(new BABYLON.Vector3(xEnd, 0, -w / 2));
        pts.push(new BABYLON.Vector3(xEnd, 0,  w / 2));
        return pts;
    }
    var cProfile = buildSlotDiscProfile(RING_R, SLIT_W, SLOT_END);
    var slitHalfAngle = Math.asin((SLIT_W / 2) / RING_R);
    var slotOuterX = RING_R * Math.cos(slitHalfAngle);   // where the notch meets the rim

    // Profile of a "reverse D" slab: a semicircular nose on -X (where the
    // ring stack drops on) extended by a straight rectangular tail to +X,
    // reaching under the panel all the way to the blue sail. Matches the
    // bottom view of the drawing: rectangle with a half-round left end.
    // xNose shifts the nose's center along +X (the tail end stays at xEnd).
    function buildDSlabProfile(R, xEnd, xNose) {
        var pts = [];
        var N = 96;
        for (var i = 0; i <= N; i++) {
            // PI/2 -> 3*PI/2: (0, R) through (-R, 0) to (0, -R)
            var t = Math.PI / 2 + Math.PI * (i / N);
            pts.push(new BABYLON.Vector3(xNose + R * Math.cos(t), 0,
                                         R * Math.sin(t)));
        }
        pts.push(new BABYLON.Vector3(xEnd, 0, -R));
        pts.push(new BABYLON.Vector3(xEnd, 0,  R));
        return pts;   // the polygon closes back to (xNose, R)
    }

    // Clear base slab. The tail runs under the panel's left part and into
    // the widened sail (0.35 of the way to their shared right face x = W;
    // longer tails looked overstretched). The panel stands on its top (see
    // PUCK_H); the sail stands on the FLOOR and passes through the slab, so
    // its footprint is carved out of the slab right below (CSG).
    var SLAB_END_LOCAL = ((trophy.position.x + W) - stack.position.x) * 0.35;
    // Nose radius = RING_R and no nose shift: the slab's round left end
    // lines up exactly under the ring stack's left edge.
    var NOSE_SHIFT = 0;
    var puckProfile = buildDSlabProfile(RING_R, SLAB_END_LOCAL, NOSE_SHIFT);
    var baseDisc = BABYLON.MeshBuilder.ExtrudePolygon("baseDisc",
        { shape: puckProfile, depth: PUCK_H }, scene, earcut);
    baseDisc.position.y = PUCK_H;  // extrusion goes -Y, so position by the top face
    // Bake the y offset into the vertices NOW, while the slab is still
    // unparented: bakeCurrentTransformIntoVertices bakes the WORLD matrix,
    // so baking after parenting would fold the stack's offset into the
    // vertices and the parent transform would then apply it a second time.
    baseDisc.bakeCurrentTransformIntoVertices();
    baseDisc.material = clearGlass;

    // --- Carve the sail's footprint out of the slab (CSG) ---
    // The cutter reuses the sail's vertex data (positions/indices are still
    // in scope), shifted from trophy-local to stack-local x and inflated ~1%
    // around the base center so the carved clear-glass walls sit a hair off
    // the blue faces instead of Z-fighting them.
    // In z the cutter is stretched x3: the slab is deeper than the sail
    // (0.525 vs the sail's back face at TP/2), and without the stretch the
    // slab's back strip would survive as a box poking out beside the sail.
    // Stretching keeps the x-y silhouette, so that strip gets cut along the
    // same slope as the sail's hypotenuse face.
    if (csgReady) {
        var X_OFF = trophy.position.x - stack.position.x;
        var scx = (SAIL_L + W) / 2 + X_OFF;
        var scz = (ZF + ZB) / 2;
        var cutPos = [];
        for (var ci = 0; ci < positions.length; ci += 3) {
            cutPos.push(
                scx + (positions[ci] + X_OFF - scx) * 1.01,
                positions[ci + 1] * 1.01 - 0.02,   // dip below the slab bottom
                scz + (positions[ci + 2] - scz) * 3);
        }
        var cutNrm = [];
        BABYLON.VertexData.ComputeNormals(cutPos, indices, cutNrm);
        var cutVD = new BABYLON.VertexData();
        cutVD.positions = cutPos;
        cutVD.indices = indices;
        cutVD.normals = cutNrm;
        cutVD.uvs = new Array(12).fill(0);   // match the slab's attributes
        var sailCutter = new BABYLON.Mesh("sailCutter", scene);
        cutVD.applyToMesh(sailCutter);

        // Both operands are in stack-local space (the slab's y offset is
        // already baked above), so boolean with ignoreWorldMatrix = true.
        var slabCSG = BABYLON.CSG2.FromMesh(baseDisc, true);
        var cutterCSG = BABYLON.CSG2.FromMesh(sailCutter, true);
        var slabDiff = slabCSG.subtract(cutterCSG);
        var carvedSlab = slabDiff.toMesh("baseDisc", scene,
            { centerMesh: false });
        slabDiff.dispose();
        slabCSG.dispose();
        cutterCSG.dispose();
        sailCutter.dispose();
        baseDisc.dispose();

        baseDisc = carvedSlab;
        baseDisc.material = clearGlass;
    }
    // Parent LAST (whether carved or not) - see the bake note above.
    baseDisc.parent = stack;

    function createRing(label, milestone) {
        // Body: the XZ-plane profile is extruded along -Y (no rotation needed)
        var body = BABYLON.MeshBuilder.ExtrudePolygon("ringBody_" + label,
            { shape: cProfile, depth: ringH }, scene, earcut);
        body.material = milestone ? mileMat : frostMat;
        if (milestone) {
            body.alphaIndex = 2;   // glass body draws before its band (3)
        }
        body.parent = stack;

        // Felt lining inside the notch (both walls + inner end pad)
        var feltLen = slotOuterX - SLOT_END;
        [-1, 1].forEach(function (side) {
            var wall = BABYLON.MeshBuilder.CreateBox("felt_" + label + side,
                { width: feltLen, height: ringH - 0.02, depth: 0.02 }, scene);
            wall.position.set(SLOT_END + feltLen / 2, -ringH / 2,
                side * (SLIT_W / 2 - 0.01));
            wall.material = feltMat;
            wall.parent = body;
        });
        var endPad = BABYLON.MeshBuilder.CreateBox("feltEnd_" + label,
            { width: 0.02, height: ringH - 0.02, depth: SLIT_W - 0.04 }, scene);
        endPad.position.set(SLOT_END + 0.01, -ringH / 2, 0);
        endPad.material = feltMat;
        endPad.parent = body;

        // Label band texture (transparent background + text only).
        // Skip mipmaps to avoid dark bleeding when minified.
        var dt = new BABYLON.DynamicTexture("ringDT_" + label,
            { width: 2048, height: 128 }, scene, false);
        dt.hasAlpha = true;
        var c = dt.getContext();
        c.clearRect(0, 0, 2048, 128);
        // Transparent pixels are "black + alpha 0", so interpolation bleeds
        // black into glyph edges and makes strokes look thicker. Nudge the
        // RGB of transparent pixels toward the text color (1% alpha is invisible).
        c.fillStyle = milestone ? "rgba(205,211,219,0.01)" : "rgba(58,65,80,0.01)";
        c.fillRect(0, 0, 2048, 128);
        // Light weight (300) to match the thin print on the real rings.
        // Resolves to Segoe UI Light (Windows) / Helvetica Neue Light (Mac),
        // falling back to regular-weight Arial when unavailable.
        if (label.length > 10) {
            c.font = "80px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif";
        } else {
            c.font = "100px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif";
        }
        c.textAlign = "center";
        c.textBaseline = "middle";
        // Draw once at the front (world -Z = theta 3*pi/2 on the arc).
        // The band's u starts at the notch edge (theta = a1), so derive
        // the front position in u from that.
        var uFront = (1.5 * Math.PI - slitHalfAngle) /
                     (2 * Math.PI - 2 * slitHalfAngle);
        var cx = uFront * 2048;
        // Compensate the difference between the band's physical aspect
        // (arc length / height) and the texture's (2048/128) with a
        // horizontal scale, so the glyph aspect survives any ring radius.
        var arcLen = (2 * Math.PI - 2 * slitHalfAngle) * (RING_R + 0.008);
        var hScale = (2048 / 128) / (arcLen / (ringH - 0.04));
        // Shrink the scale only when the label would spill past the
        // band's ends (the notch edges).
        var rawHalf = c.measureText(label).width / 2;
        var maxHalf = Math.min(cx, 2048 - cx) - 8;
        var s = Math.min(hScale, maxHalf / rawHalf);
        c.save();
        c.translate(cx, 66);
        c.scale(s, 1);
        // Embossed lettering, baked into the texture as a 3-pass draw
        // (lit-from-above convention). Offsets are y-only because the
        // horizontal scale s would distort any x offset:
        //  - milestone: RAISED silver (highlight above, shadow below,
        //    metallic gradient face), like the real "5 Years" ring
        //  - frosted:   ENGRAVED navy (shadow above, highlight below),
        //    like the etched year rings
        if (milestone) {
            c.fillStyle = "rgba(0, 8, 45, 0.6)";
            c.fillText(label, 0, 2.5);
            c.fillStyle = "rgba(255, 255, 255, 0.95)";
            c.fillText(label, 0, -2.5);
            var mg = c.createLinearGradient(0, -46, 0, 46);
            mg.addColorStop(0.0,  "#f5f7fa");
            mg.addColorStop(0.45, "#cdd3db");
            mg.addColorStop(0.55, "#aab1bc");
            mg.addColorStop(1.0,  "#868e9a");
            c.fillStyle = mg;
            c.fillText(label, 0, 0);
        } else {
            c.fillStyle = "rgba(20, 24, 34, 0.4)";
            c.fillText(label, 0, -1.5);
            c.fillStyle = "rgba(255, 255, 255, 0.85)";
            c.fillText(label, 0, 1.5);
            c.fillStyle = "#3a4150";
            c.fillText(label, 0, 0);
        }
        c.restore();
        dt.update();

        var bandMat = new BABYLON.StandardMaterial("bandMat_" + label, scene);
        // See logoMat: diffuse+alpha channel so the label exports to glTF.
        bandMat.diffuseTexture = dt;
        bandMat.useAlphaFromDiffuseTexture = true;
        bandMat.emissiveTexture = dt;
        bandMat.disableLighting = true;
        bandMat.transparencyMode = BABYLON.Material.MATERIAL_ALPHABLEND;
        bandMat.backFaceCulling = false;

        // Label band: a ribbon along the arc, skipping the notch.
        // The ribbon's u follows the path direction (increasing theta =
        // rightward when seen from outside), so unlike the cylinder builder
        // the text can be drawn as-is, without mirroring.
        // v is decided by the pathArray order; [bottom, top] renders text
        // upright. If it ever appears upside down, swap the two paths.
        var pathBottom = [], pathTop = [];
        var N = 96, RB = RING_R + 0.008;
        for (var s2 = 0; s2 <= N; s2++) {
            var t = slitHalfAngle + (2 * Math.PI - 2 * slitHalfAngle) * (s2 / N);
            var x = RB * Math.cos(t), z = RB * Math.sin(t);
            pathBottom.push(new BABYLON.Vector3(x, -ringH + 0.02, z));
            pathTop.push(new BABYLON.Vector3(x, -0.02, z));
        }
        var band = BABYLON.MeshBuilder.CreateRibbon("band_" + label,
            { pathArray: [pathBottom, pathTop],
              sideOrientation: BABYLON.Mesh.DOUBLESIDE }, scene);
        band.material = bandMat;
        band.parent = body;
        band.alphaIndex = 3;

        return body;
    }

    // Edit this list to add rings (5-year milestones use milestone: true)
    var years = [
        ["2015",         false],
        ["2016",         false],
        ["2017 - 2018 ", false],
        ["2018 - 2019 ", false],
        ["2019 - 2020 ", false],
        ["5 Years",      true ],
        ["2020 - 2021 ", false],
        ["2021 - 2022 ", false],
        ["2022 - 2023 ", false],
        ["2023 - 2024 ", false],
        ["2024 - 2025 ", false],
        ["10 Years",     true ],
        ["2025 - 2026 ", false],
        ["2026 - 2027 ", false]
    ];

    // Notch direction: 0 means local +X = toward the panel's left edge.
    // The panel's side slots into the notch, recreating the clip-on gimmick.
    var SLIT_DIR = 0;

    var gap = 0.015;
    // Start one gap above the base slab's top face (y=PUCK_H). Without this the
    // first ring's bottom would be coplanar with the puck top and Z-fight.
    var yPos = PUCK_H + gap;
    for (var r = 0; r < years.length; r++) {
        var ring = createRing(years[r][0], years[r][1]);
        // Extrusion goes -Y (top face at local y=0), so place by the top
        ring.position.y = yPos + ringH;
        ring.rotation.y = SLIT_DIR;   // align the notch on every ring
        yPos += ringH + gap;
    }

    // Per the real structure: rings are held only by the panel-edge clip
    // and stacking, so there is no center rod.

    // ---------- Desk (with mirror reflection) ----------
    var ground = BABYLON.MeshBuilder.CreateGround("ground",
        { width: 40, height: 40 }, scene);
    var groundMat = new BABYLON.StandardMaterial("groundMat", scene);
    groundMat.diffuseColor = new BABYLON.Color3(0.09, 0.065, 0.05);
    groundMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
    var mirror = new BABYLON.MirrorTexture("mirror", 1024, scene, true);
    mirror.mirrorPlane = new BABYLON.Plane(0, -1, 0, 0);
    mirror.level = 0.35;
    groundMat.reflectionTexture = mirror;
    ground.material = groundMat;
    ground.receiveShadows = true;

    mirror.renderList = scene.meshes.filter(function (m) {
        return m !== ground;
    });

    // ---------- Shadows ----------
    var sg = new BABYLON.ShadowGenerator(1024, dirLight);
    sg.useBlurExponentialShadowMap = true;
    sg.blurKernel = 32;
    sg.transparencyShadow = true;
    sg.addShadowCaster(panel);
    sg.addShadowCaster(blueSail);
    stack.getChildMeshes().forEach(function (m) {
        sg.addShadowCaster(m);
    });

    return scene;
};

window.initFunction = async function() {

  var asyncEngineCreation = async function() {
    try {
      return createDefaultEngine();
    } catch(e) {
      console.log("the available createEngine function failed. Creating the default engine instead");
      return createDefaultEngine();
    }
  }

  window.engine = await asyncEngineCreation();

  const engineOptions = window.engine.getCreationOptions?.();
  if (!engineOptions || engineOptions.audioEngine !== false) {

  }
  if (!engine) throw 'engine should not be null.';
  startRenderLoop(engine, canvas);
  // createScene is async: it awaits the CSG2/Manifold initialization.
  window.scene = await createScene();
};
initFunction().then(() => {
  sceneToRender = scene;
});

// Resize
window.addEventListener("resize", function () {
  engine.resize();
});

// ---------- Export GLB ----------
// Serializes the live scene to models/gltf/Trophy/glTF-Binary/Trophy.glb.
// The desk is scenery, not part of the trophy, so it is excluded - this
// matches the mesh set in the committed export.

// Flip the glass materials between the LIVE look (alpha blending, colored
// albedo) and the EXPORT crystal look (albedo white, alpha 1, subSurface
// refraction ON). With refraction on, Babylon's glTF serializer emits
// KHR_materials_transmission / ior / volume / dispersion; the cobalt color
// then comes from the volume attenuation (subSurface.tintColor), already
// configured on the materials. See the Materials section in createScene.
function setCrystalExportMode(s, on) {
  ["clearGlass", "blueGlass", "mileMat"].forEach(function (name) {
    var m = s.getMaterialByName(name);
    if (!m) return;
    if (on) {
      m._liveAlpha = m.alpha;
      m._liveAlbedo = m.albedoColor.clone();
      m.albedoColor = new BABYLON.Color3(1, 1, 1);
      m.alpha = 1;
      m.subSurface.isRefractionEnabled = true;
    } else {
      m.subSurface.isRefractionEnabled = false;
      m.alpha = m._liveAlpha;
      m.albedoColor = m._liveAlbedo;
    }
  });
  // The front map layer only exists for the exported file (in the live
  // alpha-blend scene it would double-image with the in-dimple map).
  var mapFront = s.getMeshByName("globeMapFront");
  if (mapFront) mapFront.setEnabled(on);
}

// ---------- Subsurface scattering for the white rings (export patch) ----------
// The frosted year rings (frostMat) should read as milky translucent
// acrylic: light entering the ring scatters inside and glows through, like
// the Khronos ScatteringSkull sample. The dense-volume recipe for that is
// KHR_materials_diffuse_transmission + KHR_materials_volume +
// KHR_materials_volume_scatter (+ ior). Babylon's serializer cannot emit
// this combination from a PBRMaterial (volume_scatter only exports from
// OpenPBRMaterial, and diffuse_transmission only for zero-thickness thin
// setups), so the extensions are patched into the exported GLB's JSON
// chunk here instead. Supported by Babylon.js and the Khronos glTF Sample
// Viewer; viewers without these extensions fall back to the plain opaque
// frosted look (none are listed in extensionsRequired).
var RING_SSS_EXTENSIONS = {
  KHR_materials_ior: { ior: 1.49 },              // acrylic
  KHR_materials_diffuse_transmission: {
    diffuseTransmissionFactor: 1.0,
    diffuseTransmissionColorFactor: [0.98, 0.97, 0.94]   // warm paper white
  },
  KHR_materials_volume: {
    thicknessFactor: 0.35,                       // ~ ring height (0.374)
    attenuationColor: [0.98, 0.96, 0.9],
    attenuationDistance: 0.5
  },
  KHR_materials_volume_scatter: {
    multiscatterColorFactor: [0.92, 0.92, 0.9]   // near-white multiscatter
  }
};

function addRingScatterToGltf(json) {
  var used = json.extensionsUsed = json.extensionsUsed || [];
  Object.keys(RING_SSS_EXTENSIONS).forEach(function (name) {
    if (used.indexOf(name) < 0) used.push(name);
  });
  (json.materials || []).forEach(function (mat) {
    if (mat.name !== "frostMat") return;
    mat.extensions = Object.assign({}, mat.extensions, RING_SSS_EXTENSIONS);
  });
}

// Rebuild a GLB with the ring extensions applied to its JSON chunk.
// Layout per spec: 12-byte header, then chunk 0 (JSON, space-padded to a
// 4-byte boundary), then the remaining chunks (BIN), which are copied
// through untouched.
function patchGlbArrayBuffer(buf) {
  var dv = new DataView(buf);
  if (dv.getUint32(0, true) !== 0x46546C67) return buf;   // not "glTF"
  var jsonLen = dv.getUint32(12, true);
  var json = JSON.parse(
    new TextDecoder().decode(new Uint8Array(buf, 20, jsonLen)));
  addRingScatterToGltf(json);
  var enc = new TextEncoder().encode(JSON.stringify(json));
  var pad = (4 - (enc.length % 4)) % 4;
  var rest = new Uint8Array(buf).subarray(20 + jsonLen);
  var out = new Uint8Array(20 + enc.length + pad + rest.length);
  var odv = new DataView(out.buffer);
  odv.setUint32(0, 0x46546C67, true);                     // "glTF"
  odv.setUint32(4, dv.getUint32(4, true), true);          // version
  odv.setUint32(8, out.length, true);                     // total length
  odv.setUint32(12, enc.length + pad, true);              // JSON chunk length
  odv.setUint32(16, 0x4E4F534A, true);                    // "JSON"
  out.set(enc, 20);
  for (var p = 0; p < pad; p++) out[20 + enc.length + p] = 0x20;
  out.set(rest, 20 + enc.length + pad);
  return out.buffer;
}

function patchRingScatterInGlbData(glb) {
  var files = glb.files || glb.glTFFiles || {};
  var names = Object.keys(files).filter(function (n) {
    return /\.glb$/i.test(n);
  });
  return Promise.all(names.map(function (n) {
    var f = files[n];
    var toBuf = f instanceof Blob ? f.arrayBuffer() : Promise.resolve(f);
    return toBuf.then(function (buf) {
      files[n] = new Blob([patchGlbArrayBuffer(buf)],
                          { type: "model/gltf-binary" });
    });
  }));
}

document.getElementById("exportGlb").addEventListener("click", function () {
  var btn = this;
  if (!scene) return;
  btn.disabled = true;
  btn.textContent = "Exporting...";

  setCrystalExportMode(scene, true);
  BABYLON.GLTF2Export.GLBAsync(scene, "Trophy", {
    shouldExportNode: function (node) {
      return node.name !== "ground" && node.name !== "hdrSkyBox";
    }
  }).then(function (glb) {
    setCrystalExportMode(scene, false);
    return patchRingScatterInGlbData(glb).then(function () {
      glb.downloadFiles();
      btn.disabled = false;
      btn.textContent = "Export GLB";
    });
  }).catch(function (e) {
    setCrystalExportMode(scene, false);
    console.error("GLB export failed:", e);
    btn.disabled = false;
    btn.textContent = "Export failed - retry";
  });
});
